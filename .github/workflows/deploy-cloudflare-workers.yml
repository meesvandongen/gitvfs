name: Deploy to Cloudflare Workers (Static)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy Static Site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # The Workers Static Assets deployment uses wrangler.
      # Requires the following repository secrets:
      #   CLOUDFLARE_API_TOKEN  – API token with "Workers Scripts:Edit" permission
      #   CLOUDFLARE_ACCOUNT_ID – Your Cloudflare account ID
      #
      # The wrangler.toml (or wrangler.json) in the repo root must define:
      #   name        – Worker name
      #   [assets]
      #     directory – Path to the built static output directory (e.g. "dist")
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
